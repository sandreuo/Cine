name: Scrape Cinema Data

on:
  schedule:
    # Runs every 12 hours
    - cron: '0 */12 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  scrape:
    # Runs on your Mac via self-hosted runner (bypasses Cloudflare block on GH datacenter IPs)
    runs-on: self-hosted
    timeout-minutes: 30  # 4 chains × ~6 cities × Playwright needs time

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Scraper
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          # CineColombia Vista Cinema JWT (12h expiry — auto-refreshed on self-hosted Mac runner via Playwright)
          CINECOLOMBIA_JWT: ${{ secrets.CINECOLOMBIA_JWT }}
        run: npx tsx scripts/scrape-all.ts
