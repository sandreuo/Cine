name: Scrape CineColombia

on:
  workflow_dispatch: # Solo manual — requiere Mac encendido

jobs:
  scrape-cinecolombia:
    name: CineColombia (self-hosted Mac)
    runs-on: self-hosted
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: Run CineColombia Scraper
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          CINECOLOMBIA_JWT: ${{ secrets.CINECOLOMBIA_JWT }}
          ONLY_CINECOLOMBIA: 'true'
        run: npx tsx scripts/scrape-all.ts
